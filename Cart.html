<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سلة المشتريات | AURA</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#111;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
color:#ff7a00;
}

.cart-item{

background:#1b1b1b;

padding:20px;

border-radius:15px;

margin-bottom:15px;
}

.cart-item h3{
margin-bottom:10px;
}

.cart-item p{
margin:5px 0;
}

.total{

background:#1b1b1b;

padding:20px;

border-radius:15px;

margin-top:20px;

text-align:center;

font-size:24px;

color:#ff7a00;
}

.buttons{

display:flex;

gap:15px;

margin-top:20px;

flex-wrap:wrap;
}

.btn{

flex:1;

padding:15px;

border:none;

border-radius:10px;

font-size:18px;

cursor:pointer;

text-decoration:none;

text-align:center;

color:white;
}

.checkout{
background:#ff7a00;
}

.clear{
background:#c62828;
}

.empty{

text-align:center;

font-size:22px;

margin-top:50px;

color:#999;
}

</style>

</head>

<body>

<div class="container">

<h1>سلة المشتريات</h1>

<div id="cartContainer"></div>

<div id="totalContainer"></div>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let cartContainer =
document.getElementById("cartContainer");

let totalContainer =
document.getElementById("totalContainer");

if(cart.length === 0){

cartContainer.innerHTML = `
<div class="empty">
السلة فارغة
</div>
`;

}
else{

let total = 0;

let html = "";

cart.forEach((item,index)=>{

total += item.price * item.qty;

html += `
<div class="cart-item">

<h3>${item.name}</h3>

<p>المقاس: ${item.size}</p>

<p>اللون: ${item.color}</p>

<p>الكمية: ${item.qty}</p>

<p>السعر: ${item.price} جنيه</p>

</div>
`;

});

cartContainer.innerHTML = html;

totalContainer.innerHTML = `

<div class="total">

الإجمالي: ${total} جنيه

</div>

<div class="buttons">

<a
href="order.html"
class="btn checkout">

إتمام الطلب

</a>

<button
class="btn clear"
onclick="clearCart()">

مسح السلة

</button>

</div>

`;

}

function clearCart(){

localStorage.removeItem("cart");

location.reload();

}

</script>

</body>

</html>
