<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AURA Product</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
  
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<div class="header-icons">

<a href="cart.html" class="cart-icon">

<i class="fa-solid fa-cart-shopping"></i>

<span id="cart-count">0</span>

</a>


</div>

    <div class="logo">AURA</div>

    <div class="menu-btn" onclick="toggleMenu()">
         ☰
    </div>

<nav id="mobileMenu">

<a href="Home.html">الرئيسية</a>

<a href="Products.html">المتجر</a>

<a href="Categorys.html">التصنيفات</a>

<a href="#">تواصل</a>

</nav>

</header>

<section class="single-product">

<div class="product-image">

<img src="product1.jpg">

</div>

<div class="product-info">

<h1>تيشيرت رنغوكو</h1>

<p class="price">650 جنيه</p>

<p>
تيشيرت أنمي بخامة قطن ممتازة وطباعة عالية الجودة.
</p>

<label>المقاس:</label>

<select id="size">

<option>M</option>

<option>L</option>

<option>XL</option>

<option>XXL</option>

<option>3XL</option>

</select>

<br><br>

<label>اللون:</label>

<select id="color">

<option>أسود</option>

<option>أبيض</option>

<option>أزرق</option>

<option>بيج</option>

<option>رمادي</option>

</select>

<label>الكمية:</label>

<div class="quantity-box">

<button type="button" onclick="decreaseQty()">
-
</button>

<input
type="number"
id="qty"
value="1"
min="1"
readonly>

<button type="button" onclick="increaseQty()">
+
</button>

</div>

<br><br>

<button
class="whatsapp-btn"
onclick="addToCart()">

إضافة للسلة

</button>

</div>

</section>

<footer>

    <h2>AURA</h2>

    <p>
        Wear Your Power
    </p>

    <div class="footer-links">

        <a href="#">Instagram</a>

        <a href="#">TikTok</a>

        <a href="#">WhatsApp</a>

    </div>

    <p class="copyright">
        © 2026 AURA. All Rights Reserved.
    </p>

</footer>
<a href="https://wa.me/201115539536" class="floating-whatsapp">

💬

</a>
<script src="script.js"></script>
<script>

function addToCart(){

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

cart.push({

name:"تيشيرت رنغوكو",

price:650,

size:
document.getElementById("size").value,

color:
document.getElementById("color").value,

qty:
parseInt(
document.getElementById("qty").value
)

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("تمت إضافة المنتج للسلة");

window.location.href =
"cart.html";

}

</script>
<script>

function increaseQty(){

let qty =
document.getElementById("qty");

qty.value =
parseInt(qty.value) + 1;

}

function decreaseQty(){

let qty =
document.getElementById("qty");

if(parseInt(qty.value) > 1){

qty.value =
parseInt(qty.value) - 1;

}

}

</script>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cart-count")
.innerText = cart.length;

</script>

</body>

</html>
